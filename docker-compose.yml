services:
  auth-service:
    build: ./auth-service
    ports:
      - "5001:5001"

  account-service:
    build: ./account-service
    ports:
      - "5002:5002"

  notification-service:
    build: ./notification-service
    ports:
      - "5004:5004"

  payment-service:
    build: ./payment-service
    ports:
      - "5003:5003"
    depends_on:
      - auth-service
      - account-service
      - notification-service
